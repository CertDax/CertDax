# Full example: CertDax certificate + Traefik IngressRoute
apiVersion: certdax.com/v1alpha1
kind: CertDaxCertificate
metadata:
  name: webapp-cert
  namespace: default
spec:
  certificateId: 42
  type: selfsigned
  secretName: webapp-tls
  syncInterval: "1h"
  includeCA: true
  secretLabels:
    app: webapp
  secretAnnotations:
    description: "Managed by CertDax operator"
---
# Traefik IngressRoute referencing the TLS secret
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: webapp
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`webapp.example.com`)
      kind: Rule
      services:
        - name: webapp-svc
          port: 80
  tls:
    secretName: webapp-tls
---
