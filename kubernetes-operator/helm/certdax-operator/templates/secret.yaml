{{- if not .Values.certdax.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "certdax-operator.fullname" . }}-api
  labels:
    {{- include "certdax-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ required "certdax.apiKey is required when existingSecret is not set" .Values.certdax.apiKey | quote }}
{{- end }}
