apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certdaxcertificates.certdax.com
  labels:
    {{- include "certdax-operator.labels" . | nindent 4 }}
spec:
  group: certdax.com
  names:
    kind: CertDaxCertificate
    listKind: CertDaxCertificateList
    plural: certdaxcertificates
    singular: certdaxcertificate
    shortNames:
      - cdxcert
      - cdx
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: CertDaxCertificate syncs a certificate from CertDax into a Kubernetes TLS secret.
          properties:
            spec:
              type: object
              required:
                - secretName
              properties:
                certificateId:
                  type: integer
                  description: "ID of the certificate in CertDax. Set to 0 with a request block to request a new certificate."
                  default: 0
                type:
                  type: string
                  description: "Certificate type: selfsigned or acme."
                  enum:
                    - selfsigned
                    - acme
                  default: selfsigned
                request:
                  type: object
                  description: "Request a new certificate via the CertDax API (used when certificateId is 0)."
                  required:
                    - commonName
                  properties:
                    commonName:
                      type: string
                      description: Primary domain / CN for the certificate.
                    sanDomains:
                      type: string
                      description: "Comma-separated Subject Alternative Names."
                    providerId:
                      type: integer
                      description: "CertDax ACME provider ID (required for type: acme)."
                    caId:
                      type: integer
                      description: "CertDax CA certificate ID to sign with (for type: selfsigned)."
                    isCA:
                      type: boolean
                      description: "Create a CA certificate instead of a regular certificate."
                      default: false
                    autoRenew:
                      type: boolean
                      description: Enable automatic renewal.
                      default: true
                    validityDays:
                      type: integer
                      description: "Number of days the self-signed certificate is valid."
                      default: 365
                secretName:
                  type: string
                  description: Name of the Kubernetes TLS secret to create/update.
                secretNamespace:
                  type: string
                  description: Override namespace for the TLS secret (defaults to resource namespace).
                syncInterval:
                  type: string
                  description: "How often to re-sync (e.g. 1h, 30m). Defaults to 1h."
                  default: "1h"
                includeCA:
                  type: boolean
                  description: Include CA certificate in the secret's ca.crt field.
                  default: true
                secretLabels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Additional labels for the TLS secret.
                secretAnnotations:
                  type: object
                  additionalProperties:
                    type: string
                  description: Additional annotations for the TLS secret.
            status:
              type: object
              properties:
                ready:
                  type: boolean
                certificateId:
                  type: integer
                  description: "CertDax certificate ID (set by operator after requesting a new certificate)."
                secretName:
                  type: string
                commonName:
                  type: string
                expiresAt:
                  type: string
                lastSyncedAt:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Secret
          type: string
          jsonPath: .spec.secretName
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: CN
          type: string
          jsonPath: .status.commonName
        - name: Expires
          type: string
          jsonPath: .status.expiresAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
