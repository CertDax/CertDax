apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "certdax-operator.fullname" . }}
  labels:
    {{- include "certdax-operator.labels" . | nindent 4 }}
rules:
  # CertDaxCertificate resources
  - apiGroups: ["certdax.com"]
    resources: ["certdaxcertificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["certdax.com"]
    resources: ["certdaxcertificates/status"]
    verbs: ["get", "update", "patch"]
  # TLS Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Ingresses (for dashboard visibility)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Traefik IngressRoutes (for dashboard visibility)
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "certdax-operator.fullname" . }}
  labels:
    {{- include "certdax-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "certdax-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certdax-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
