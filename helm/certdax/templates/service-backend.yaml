apiVersion: v1
kind: Service
metadata:
  name: {{ include "certdax.fullname" . }}-backend
  labels:
    {{- include "certdax.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "certdax.backendSelectorLabels" . | nindent 4 }}
